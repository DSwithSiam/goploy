name: Release Goploy Binary

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Linux amd64 binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o goploy-linux-amd64 ./cmd/goploy

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: goploy-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
